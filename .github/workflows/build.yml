name: Build CMD Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Sol Client
        run: git clone https://github.com/Sol-Client/Client sol-client

      - name: Set up JDK 17
        uses: actions/upload-artifact@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch names
        run: |
          cd sol-client
          find src -type f \( -name "*.java" -o -name "*.json" -o -name "*.lang" -o -name "*.properties" -o -name "*.gradle" -o -name "*.yml" -o -name "*.txt" -o -name "*.xml" \) | xargs sed -i 's/Sol Client/CMD Client/g; s/sol_client/cmd_client/g; s/sol-client/cmd-client/g; s/SolClient/CmdClient/g'

      - name: Build
        run: |
          cd sol-client
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: CMD-Client
          path: sol-client/build/libs/*.jar
